# SonarQube Configuration for Food Delivery Project
sonar.projectKey=food-delivery
sonar.projectName=Food Delivery
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=backend,frontend/src,admin/src

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js,**/uploads/**

# JavaScript/JSX settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
